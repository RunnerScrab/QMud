name: Pipelines

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_coverage:
        description: "Force coverage run"
        required: false
        type: boolean
        default: false
      run_full_tests:
        description: "Run full test suite"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  full-tests:
    name: Scheduled/manual full suite
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.run_full_tests == true || inputs.run_full_tests == 'true'))
    runs-on: [self-hosted, primary]
    timeout-minutes: 90
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja ctest python3 pkg-config gcc g++; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Configure CMake
        run: |
          CCACHE_DISABLE=1 cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_ENABLE_TESTING=ON \
            -DQMUD_ENABLE_GUI_TESTS=ON

      - name: Build
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release -j 6

      - name: Run full test suite
        run: |
          ctest --test-dir cmake-build-release --output-on-failure

      - name: Upload CTest logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctest-logs-full
          if-no-files-found: ignore
          path: |
            cmake-build-release/Testing/Temporary/*
            cmake-build-release/Testing/**/*.xml

      - name: Upload failing test executables
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qtest-binaries-full
          if-no-files-found: ignore
          path: |
            cmake-build-release/tests/tst_*

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets

  code-path-gate:
    name: Code path gate (src/tests changed)
    if: (github.event_name == 'pull_request' && github.event.action != 'closed') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: [self-hosted, primary]
    outputs:
      run_code_pipeline: ${{ steps.filter.outputs.run_code_pipeline }}
      run_coverage: ${{ steps.filter.outputs.run_coverage }}

    steps:
      - name: Detect code/test changes
        id: filter
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const isCoverageTrigger = (filename) => (
              filename.startsWith("src/") ||
              filename.startsWith("tests/")
            );
            const isCodePipelineTrigger = (filename) => (
              isCoverageTrigger(filename) ||
              filename.startsWith("resources/") ||
              filename.startsWith("skeleton/") ||
              filename.startsWith("tools/") ||
              filename === "CMakeLists.txt" ||
              filename.endsWith("/CMakeLists.txt")
            );

            let runPipeline = false;
            let runCoverage = false;

            if (eventName === "pull_request") {
              const prNumber = context.payload.pull_request.number;
              let page = 1;
              while (true) {
                const response = await github.rest.pulls.listFiles({
                  owner,
                  repo,
                  pull_number: prNumber,
                  per_page: 100,
                  page,
                });
                const files = Array.isArray(response.data) ? response.data : [];
                runPipeline = runPipeline || files.some((file) => isCodePipelineTrigger(file.filename || ""));
                runCoverage = runCoverage || files.some((file) => isCoverageTrigger(file.filename || ""));
                if ((runPipeline && runCoverage) || files.length < 100) {
                  break;
                }
                page += 1;
              }
              core.info(`PR #${prNumber} run_code_pipeline=${runPipeline}, run_coverage=${runCoverage}`);
            } else if (eventName === "push") {
              const before = context.payload.before;
              const after = context.payload.after || context.sha;
              if (!before || /^0+$/.test(before)) {
                core.info("No valid base SHA in push payload; running code pipeline by default, skipping coverage.");
                runPipeline = true;
                runCoverage = false;
              } else {
                const response = await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${before}...${after}`,
                });
                const files = Array.isArray(response.data.files) ? response.data.files : [];
                runPipeline = files.some((file) => isCodePipelineTrigger(file.filename || ""));
                runCoverage = files.some((file) => isCoverageTrigger(file.filename || ""));
                core.info(`Compared ${before}...${after} (${files.length} files), run_code_pipeline=${runPipeline}, run_coverage=${runCoverage}`);
              }
            } else {
              core.info(`Unsupported event ${eventName} for code path gate`);
            }

            core.setOutput("run_code_pipeline", runPipeline ? "true" : "false");
            core.setOutput("run_coverage", runCoverage ? "true" : "false");

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets

  coverage:
    name: Coverage on main pushes after build (llvm/gcov)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.code-path-gate.outputs.run_coverage == 'true'
    needs:
      - build-packages
      - code-path-gate
    runs-on: [self-hosted, primary]
    timeout-minutes: 120
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja ctest python3 pkg-config gcc g++ gcovr; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Configure CMake (coverage)
        run: |
          CCACHE_DISABLE=1 cmake -S . -B cmake-build-coverage -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_ENABLE_TESTING=ON \
            -DQMUD_ENABLE_GUI_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build coverage test targets
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          listing = subprocess.check_output(
              ["ctest", "--test-dir", "cmake-build-coverage", "-N", "--show-only=json-v1"],
              text=True,
          )
          payload = json.loads(listing)
          targets = [entry.get("name", "").strip() for entry in payload.get("tests", [])]
          targets = [name for name in targets if name]
          if not targets:
              raise SystemExit("No CTest targets discovered for coverage build.")

          chunk_size = 20
          for index in range(0, len(targets), chunk_size):
              chunk = targets[index:index + chunk_size]
              env = os.environ.copy()
              env["CCACHE_DISABLE"] = "1"
              subprocess.check_call(
                  ["cmake", "--build", "cmake-build-coverage", "-j", "6", "--target", *chunk],
                  env=env,
              )
          PY

      - name: Run tests for coverage
        run: |
          ctest --test-dir cmake-build-coverage --output-on-failure --label-exclude slow

      - name: Generate coverage report
        run: |
          mkdir -p coverage-html
          gcovr \
            --root "$GITHUB_WORKSPACE" \
            --object-directory cmake-build-coverage \
            --filter "$GITHUB_WORKSPACE/src/" \
            --print-summary \
            --xml-pretty --xml coverage.xml \
            --html-details coverage-html/index.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qmud-coverage
          if-no-files-found: error
          path: |
            coverage.xml
            coverage-html/**

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets

  coverage-manual:
    name: Manual coverage (forced)
    if: github.event_name == 'workflow_dispatch' && (inputs.force_coverage == true || inputs.force_coverage == 'true')
    runs-on: [self-hosted, primary]
