        uses: actions/download-artifact@v8
        with:
          pattern: qmud-*
          path: release-assets

      - name: Move rolling CI tag to current commit
        run: |
          CI_TAG="ci-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${CI_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${CI_TAG}" --force

