        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets

  build-packages:
    name: Build AppImage / macOS / Windows packages (PR/Main)
    if: ((github.event_name == 'pull_request' && github.event.action != 'closed') || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && needs.code-path-gate.outputs.run_code_pipeline == 'true'
    needs: code-path-gate
    runs-on: [self-hosted, primary]
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve package version metadata
        run: |
          set -euo pipefail

          VERSION_LINE="$(grep -F -m1 'kVersionString[]' src/Version.h || true)"
          BASE_VERSION="${VERSION_LINE#*\"}"
          BASE_VERSION="${BASE_VERSION%%\"*}"
          if [ -z "$BASE_VERSION" ]; then
            echo "Failed to resolve kVersionString from src/Version.h" >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          PACKAGE_VERSION="ci-${SHORT_SHA}"

          echo "QMUD_BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "QMUD_PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja ctest python3 pkg-config gcc g++ curl patchelf podman; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Resolve container executable for CMake targets
        run: |
          CONTAINER_BIN="$(command -v podman || true)"
          if [ -z "$CONTAINER_BIN" ]; then
            echo "podman executable not found on PATH." >&2
            exit 1
          fi
          echo "QMUD_DOCKER_EXECUTABLE=$CONTAINER_BIN" >> "$GITHUB_ENV"
          "$CONTAINER_BIN" --version

      - name: Configure CMake
        run: |
          cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_ENABLE_TESTING=ON \
            -DQMUD_ENABLE_GUI_TESTS=ON \
            -DQMUD_CI_BUILD=ON \
            -DQMUD_APPIMAGE_VERSION="$QMUD_PACKAGE_VERSION" \
            -DQMUD_DOCKER_EXECUTABLE="$QMUD_DOCKER_EXECUTABLE" \
            -DQMUD_ENABLE_APPIMAGE=OFF \
            -DQMUD_ENABLE_APPIMAGE_DOCKER=ON \
            -DQMUD_ENABLE_MAC_DOCKER=ON \
            -DQMUD_ENABLE_WINDOCKER=ON

      - name: Build (release + tests)
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release -j 6

      - name: Run quick test suite
        run: |
          ctest --test-dir cmake-build-release --output-on-failure --label-exclude slow

      - name: Upload CTest logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctest-logs-quick
          if-no-files-found: ignore
          path: |
            cmake-build-release/Testing/Temporary/*
            cmake-build-release/Testing/**/*.xml

      - name: Upload failing test executables
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qtest-binaries-quick
          if-no-files-found: ignore
          path: |
            cmake-build-release/tests/tst_*

      - name: Build AppImage image
        run: |
          if podman image exists qmud-appimage-builder:qt6.11; then
            echo "Image qmud-appimage-builder:qt6.11 already exists, skipping build."
          else
            podman build \
              --file tools/docker/appimage-qt611/Dockerfile \
              --tag qmud-appimage-builder:qt6.11 \
              tools/docker/appimage-qt611
          fi

      - name: Build macOS cross image
        run: |
          if podman image exists qmud-macos-builder:qt6.11; then
            echo "Image qmud-macos-builder:qt6.11 already exists, skipping build."
          else
            podman build \
              --file tools/docker/macos-qt611/Dockerfile \
              --tag qmud-macos-builder:qt6.11 \
              tools/docker/macos-qt611
          fi

      - name: Build Windows cross image
        run: |
          if podman image exists qmud-windows-builder:qt6.11; then
            echo "Image qmud-windows-builder:qt6.11 already exists, skipping build."
          else
            podman build \
              --file tools/docker/windows-qt611/Dockerfile \
              --tag qmud-windows-builder:qt6.11 \
              tools/docker/windows-qt611
          fi

      - name: Build AppImage
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target AppImageDocker -j 6

      - name: Build macOS package
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target MacDockerU -j 6

      - name: Build Windows package
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target WinDocker -j 6

      - name: Normalize packaged asset filenames
        run: |
          set -euo pipefail

          MAC_ZIP_SRC="cmake-build-release/mac-docker-out/QMud.app.zip"
          MAC_ZIP_DST="cmake-build-release/mac-docker-out/QMud-${QMUD_PACKAGE_VERSION}-macos.app.zip"
          MAC_DMG_SRC="cmake-build-release/mac-docker-out/QMud.dmg"
          MAC_DMG_DST="cmake-build-release/mac-docker-out/QMud-${QMUD_PACKAGE_VERSION}-macos.dmg"
          WIN_SRC="cmake-build-release/windows-docker-out/QMud.zip"
          WIN_DST="cmake-build-release/windows-docker-out/QMud-${QMUD_PACKAGE_VERSION}-windows.zip"
          WIN_SETUP_SRC="cmake-build-release/windows-docker-out/QMud-setup.exe"
          WIN_SETUP_DST="cmake-build-release/windows-docker-out/QMud-${QMUD_PACKAGE_VERSION}-win-setup.exe"

          if [ ! -f "$MAC_ZIP_SRC" ]; then
            echo "Missing macOS auto-update package: $MAC_ZIP_SRC" >&2
            exit 1
          fi
          if [ ! -f "$MAC_DMG_SRC" ]; then
            echo "Missing macOS DMG package: $MAC_DMG_SRC" >&2
            exit 1
          fi
          if [ ! -f "$WIN_SRC" ]; then
            echo "Missing Windows package: $WIN_SRC" >&2
            exit 1
          fi
          if [ ! -f "$WIN_SETUP_SRC" ]; then
            echo "Missing Windows installer: $WIN_SETUP_SRC" >&2
            exit 1
          fi

          mv -f "$MAC_ZIP_SRC" "$MAC_ZIP_DST"
          mv -f "$MAC_DMG_SRC" "$MAC_DMG_DST"
          mv -f "$WIN_SRC" "$WIN_DST"
          mv -f "$WIN_SETUP_SRC" "$WIN_SETUP_DST"

          APPIMAGE_FILE="$(find cmake-build-release/appimage-docker-out -maxdepth 1 -type f -name '*.AppImage' | sort | head -n 1)"
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "Missing AppImage package in cmake-build-release/appimage-docker-out" >&2
            exit 1
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: qmud-appimage
          if-no-files-found: error
          path: |
            cmake-build-release/appimage-docker-out/*.AppImage
            cmake-build-release/appimage-docker-out/*.AppImage.zsync

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: qmud-macos
          if-no-files-found: error
          path: |
            cmake-build-release/mac-docker-out/QMud-*.app.zip
            cmake-build-release/mac-docker-out/QMud-*.dmg

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: qmud-windows
          if-no-files-found: error
          path: |
            cmake-build-release/windows-docker-out/QMud-*.zip
            cmake-build-release/windows-docker-out/QMud-*.exe

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets

  build-packages-tag:
    name: Build AppImage / macOS / Windows packages (Tag)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, primary]
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve package version metadata
        run: |
          set -euo pipefail

          VERSION_LINE="$(grep -F -m1 'kVersionString[]' src/Version.h || true)"
          BASE_VERSION="${VERSION_LINE#*\"}"
          BASE_VERSION="${BASE_VERSION%%\"*}"
          if [ -z "$BASE_VERSION" ]; then
            echo "Failed to resolve kVersionString from src/Version.h" >&2
            exit 1
          fi

          echo "QMUD_BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "QMUD_PACKAGE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"

      - name: Verify preinstalled host build dependencies
        run: |
          set -euo pipefail
          for tool in cmake ninja python3 pkg-config gcc g++ curl patchelf podman; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool" >&2; exit 1; }
          done

      - name: Resolve preinstalled host Qt 6
        run: |
          set -euo pipefail
          QT6_CMAKE_DIR=""
          if [ -n "${QT_ROOT:-}" ]; then
            if [ -d "$QT_ROOT/lib/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib/cmake/Qt6"
            elif [ -d "$QT_ROOT/lib64/cmake/Qt6" ]; then
              QT6_CMAKE_DIR="$QT_ROOT/lib64/cmake/Qt6"
            else
              echo "QT_ROOT is set but Qt6 CMake package was not found under $QT_ROOT." >&2
              exit 1
            fi
          else
            QT6_CONFIG_FILE="$(find /opt/Qt /usr/lib64 /usr/lib -type f -path '*/cmake/Qt6/Qt6Config.cmake' 2>/dev/null | sort | head -n 1 || true)"
            if [ -z "$QT6_CONFIG_FILE" ]; then
              echo "Failed to locate Qt6Config.cmake on runner. Install Qt6 development packages or set QT_ROOT." >&2
              exit 1
            fi
            QT6_CMAKE_DIR="$(dirname "$QT6_CONFIG_FILE")"
          fi

          QT_ROOT="$(cd "$QT6_CMAKE_DIR/../../.." && pwd)"
          if [ ! -d "$QT6_CMAKE_DIR" ]; then
            echo "Resolved Qt6 CMake directory is invalid: $QT6_CMAKE_DIR" >&2
            exit 1
          fi
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "QT6_CMAKE_DIR=$QT6_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "$QT_ROOT/bin" >> "$GITHUB_PATH"

      - name: Resolve container executable for CMake targets
        run: |
          CONTAINER_BIN="$(command -v podman || true)"
          if [ -z "$CONTAINER_BIN" ]; then
            echo "podman executable not found on PATH." >&2
            exit 1
          fi
          echo "QMUD_DOCKER_EXECUTABLE=$CONTAINER_BIN" >> "$GITHUB_ENV"
          "$CONTAINER_BIN" --version

      - name: Build AppImage image
        run: |
          if podman image exists qmud-appimage-builder:qt6.11; then
            echo "Image qmud-appimage-builder:qt6.11 already exists, skipping build."
          else
            podman build \
              --file tools/docker/appimage-qt611/Dockerfile \
              --tag qmud-appimage-builder:qt6.11 \
              tools/docker/appimage-qt611
          fi

      - name: Build macOS cross image
        run: |
          if podman image exists qmud-macos-builder:qt6.11; then
            echo "Image qmud-macos-builder:qt6.11 already exists, skipping build."
          else
            podman build \
              --file tools/docker/macos-qt611/Dockerfile \
              --tag qmud-macos-builder:qt6.11 \
              tools/docker/macos-qt611
          fi

      - name: Build Windows cross image
        run: |
          if podman image exists qmud-windows-builder:qt6.11; then
            echo "Image qmud-windows-builder:qt6.11 already exists, skipping build."
          else
            podman build \
              --file tools/docker/windows-qt611/Dockerfile \
              --tag qmud-windows-builder:qt6.11 \
              tools/docker/windows-qt611
          fi

      - name: Configure CMake
        run: |
          cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DQt6_DIR="$QT6_CMAKE_DIR" \
            -DQMUD_CI_BUILD=OFF \
            -DQMUD_APPIMAGE_VERSION="$QMUD_PACKAGE_VERSION" \
            -DQMUD_DOCKER_EXECUTABLE="$QMUD_DOCKER_EXECUTABLE" \
            -DQMUD_ENABLE_APPIMAGE=OFF \
            -DQMUD_ENABLE_APPIMAGE_DOCKER=ON \
            -DQMUD_ENABLE_MAC_DOCKER=ON \
            -DQMUD_ENABLE_WINDOCKER=ON

      - name: Build AppImage
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target AppImageDocker -j 6

      - name: Build macOS package
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target MacDockerU -j 6

      - name: Build Windows package
        run: |
          CCACHE_DISABLE=1 cmake --build cmake-build-release --target WinDocker -j 6

      - name: Normalize packaged asset filenames
        run: |
          set -euo pipefail

          MAC_ZIP_SRC="cmake-build-release/mac-docker-out/QMud.app.zip"
          MAC_ZIP_DST="cmake-build-release/mac-docker-out/QMud-${QMUD_PACKAGE_VERSION}-macos.app.zip"
          MAC_DMG_SRC="cmake-build-release/mac-docker-out/QMud.dmg"
          MAC_DMG_DST="cmake-build-release/mac-docker-out/QMud-${QMUD_PACKAGE_VERSION}-macos.dmg"
          WIN_SRC="cmake-build-release/windows-docker-out/QMud.zip"
          WIN_DST="cmake-build-release/windows-docker-out/QMud-${QMUD_PACKAGE_VERSION}-windows.zip"
          WIN_SETUP_SRC="cmake-build-release/windows-docker-out/QMud-setup.exe"
          WIN_SETUP_DST="cmake-build-release/windows-docker-out/QMud-${QMUD_PACKAGE_VERSION}-win-setup.exe"

          if [ ! -f "$MAC_ZIP_SRC" ]; then
            echo "Missing macOS auto-update package: $MAC_ZIP_SRC" >&2
            exit 1
          fi
          if [ ! -f "$MAC_DMG_SRC" ]; then
            echo "Missing macOS DMG package: $MAC_DMG_SRC" >&2
            exit 1
          fi
          if [ ! -f "$WIN_SRC" ]; then
            echo "Missing Windows package: $WIN_SRC" >&2
            exit 1
          fi
          if [ ! -f "$WIN_SETUP_SRC" ]; then
            echo "Missing Windows installer: $WIN_SETUP_SRC" >&2
            exit 1
          fi

          mv -f "$MAC_ZIP_SRC" "$MAC_ZIP_DST"
          mv -f "$MAC_DMG_SRC" "$MAC_DMG_DST"
          mv -f "$WIN_SRC" "$WIN_DST"
          mv -f "$WIN_SETUP_SRC" "$WIN_SETUP_DST"

          APPIMAGE_FILE="$(find cmake-build-release/appimage-docker-out -maxdepth 1 -type f -name '*.AppImage' | sort | head -n 1)"
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "Missing AppImage package in cmake-build-release/appimage-docker-out" >&2
            exit 1
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: qmud-appimage
          if-no-files-found: error
          path: |
            cmake-build-release/appimage-docker-out/*.AppImage
            cmake-build-release/appimage-docker-out/*.AppImage.zsync

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: qmud-macos
          if-no-files-found: error
          path: |
            cmake-build-release/mac-docker-out/QMud-*.app.zip
            cmake-build-release/mac-docker-out/QMud-*.dmg

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: qmud-windows
          if-no-files-found: error
          path: |
            cmake-build-release/windows-docker-out/QMud-*.zip
            cmake-build-release/windows-docker-out/QMud-*.exe

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets

  publish-release:
    name: Publish GitHub release assets
    needs: build-packages-tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, primary]
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: qmud-*
          path: release-assets

      - name: Build release changelog body
        id: release_changelog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname --list 'v*' | awk -v cur="${CURRENT_TAG}" '$0 != cur {print; exit}')"
          RANGE="${CURRENT_TAG}^!"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi
          export RANGE
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.request

          range_spec = os.environ.get("RANGE", "").strip()
          repo = os.environ["GITHUB_REPOSITORY"]
          api_base = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
          token = os.environ.get("GITHUB_TOKEN", "").strip()
          output_path = "release-notes.md"

          def split_sentences(text: str) -> list[str]:
              collapsed = " ".join(text.split())
              if not collapsed:
                  return []
              return [part.strip() for part in re.split(r"(?<=\.)\s+", collapsed) if part.strip()]

          commit_pr_cache: dict[str, list[dict]] = {}

          def fetch_commit_prs(sha: str) -> list[dict]:
              if sha in commit_pr_cache:
                  return commit_pr_cache[sha]
              url = f"{api_base}/repos/{repo}/commits/{sha}/pulls"
              headers = {
                  "Accept": "application/vnd.github+json, application/vnd.github.groot-preview+json",
                  "User-Agent": "qmud-release-notes",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
              except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError, json.JSONDecodeError):
                  payload = []
              prs = payload if isinstance(payload, list) else []
              commit_pr_cache[sha] = prs
              return prs

          raw = subprocess.check_output(
              ["git", "rev-list", "--first-parent", "--reverse", range_spec],
              text=True,
              encoding="utf-8",
              errors="replace",
          )
          commits = [line.strip() for line in raw.splitlines() if line.strip()]

          lines = ["## What's changed", ""]
          seen_prs: set[str] = set()
          if commits:
              for sha in commits:
                  prs = fetch_commit_prs(sha)
                  if not prs:
                      continue
                  for pr_payload in prs:
                      if not isinstance(pr_payload, dict):
                          continue
                      number = pr_payload.get("number")
                      if number is None:
                          continue
                      pr_number = str(number).strip()
                      if not pr_number or pr_number in seen_prs:
                          continue
                      seen_prs.add(pr_number)

                      source_text = str(pr_payload.get("title", "")).strip()
                      if not source_text:
                          source_text = "Untitled PR."
                      sentences = split_sentences(source_text)
                      if not sentences:
                          sentences = [source_text]

                      login = ""
                      user = pr_payload.get("user")
                      if isinstance(user, dict):
                          login = str(user.get("login", "")).strip()

                      for sentence in sentences:
                          if login:
                              lines.append(f"* {sentence} by @{login} (#{pr_number})")
                          else:
                              lines.append(f"* {sentence} (#{pr_number})")

          if len(lines) == 2:
              lines.append("* No merged pull requests found in selected range.")

          with open(output_path, "w", encoding="utf-8") as fh:
              fh.write("\n".join(lines).rstrip() + "\n")
          PY
          echo "body_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: ${{ steps.release_changelog.outputs.body_path }}
          files: |
            release-assets/qmud-appimage/*.AppImage
            release-assets/qmud-appimage/*.AppImage.zsync
            release-assets/qmud-macos/*.app.zip
            release-assets/qmud-macos/*.dmg
            release-assets/qmud-windows/*.zip
            release-assets/qmud-windows/*.exe

      - name: Announce tagged release on Discord
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_NOTES_PATH: ${{ steps.release_changelog.outputs.body_path }}
        run: |
          if [ -z "${DISCORD_RELEASE_WEBHOOK_URL}" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL is not set." >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_RELEASE_WEBHOOK_URL"].strip()
          notes_path = os.environ["RELEASE_NOTES_PATH"].strip()
          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["GITHUB_REF_NAME"]
          release_url = f"https://github.com/{repo}/releases/tag/{tag}"

          def post_message(content: str) -> None:
              payload = json.dumps({"content": content}).encode("utf-8")
              request = urllib.request.Request(
                  webhook,
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "qmud-release-discord",
                  },
              )
              with urllib.request.urlopen(request, timeout=20):
                  pass

          with open(notes_path, "r", encoding="utf-8") as fh:
              notes = fh.read()
          notes = notes.strip()
          if not notes:
              notes = "(No release notes.)"

          combined_message = f"QMud {tag} released: <{release_url}>\n\n{notes}"

          max_len = 2000
          chunks = []
          remaining = combined_message
          while remaining:
              if len(remaining) <= max_len:
                  chunks.append(remaining)
                  break
              split_index = remaining.rfind("\n", 0, max_len)
              if split_index <= 0:
                  split_index = max_len
              chunks.append(remaining[:split_index])
              remaining = remaining[split_index:]

          for chunk in chunks:
              post_message(chunk)
          PY

      - name: Cleanup workspace build directories
        if: always()
        run: |
          rm -rf cmake-build-release cmake-build-coverage release-assets release-notes.md ci-release-notes.md

  publish-ci-release:
    name: Publish rolling CI prerelease
    needs: build-packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, primary]
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve base version from Version.h
        id: version
        run: |
          VERSION_LINE="$(grep -F -m1 'kVersionString[]' src/Version.h || true)"
          BASE_VERSION="${VERSION_LINE#*\"}"
